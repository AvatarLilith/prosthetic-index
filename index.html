<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avatar Lilith's Prosthetic Index — Archive 5.0</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #ff0000;
    --ink: #1a1a1a;
    --paper: #f5f3ef;
    --paper-dark: #ede9e2;
    --rule: #d0cbc0;
    --muted: #8a8070;
    --hover-bg: #edeae3;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  a { text-decoration: none; }
  a:hover { text-decoration: none; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    cursor: default;
  }

  /* ── INDEX VIEW ── */
  #index-view {
    position: relative;
    max-width: 1000px;
    margin: 0 auto;
    padding: 60px 32px 120px;
  }

  #index-view::after {
    content: '';
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 280px;
    background: linear-gradient(to bottom, transparent 0%, var(--paper) 100%);
    pointer-events: none;
    z-index: 10;
  }

  .archive-header {
    margin-bottom: 48px;
  }

  .archive-title {
    font-family: 'Times New Roman', Times, serif;
    font-size: clamp(20px, 3.5vw, 32px);
    font-weight: 400;
    color: var(--red);
    line-height: 1.2;
    margin-bottom: 10px;
  }

  .archive-subtitle {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .table-header {
    display: grid;
    grid-template-columns: 48px 100px 220px 1fr 100px;
    gap: 0 24px;
    padding: 8px 12px;
    font-family: 'Times New Roman', Times, serif;
    font-size: 24px;
    font-weight: 400;
    color: #000000;
    letter-spacing: 0;
  }

  .table-header span:last-child { text-align: right; }

  /* ── ENTRY ROW ── */
  .entry {
    display: grid;
    grid-template-columns: 48px 100px 220px 1fr 100px;
    gap: 0 24px;
    padding: 14px 12px;
    cursor: pointer;
    position: relative;
    transition: background 0.12s ease;
    align-items: start;
  }

  .entry:hover {
    background: transparent;
    text-shadow: 0 0 18px rgba(64, 224, 208, 0.9), 0 0 40px rgba(64, 224, 208, 0.5);
  }

  .entry:hover .entry-date,
  .entry:hover .entry-item,
  .entry:hover .entry-desc,
  .entry:hover .entry-type,
  .entry:hover .entry-thumb img {
    color: #ff0000;
    filter: blur(1.2px);
  }

  .entry-thumb {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .entry-thumb img {
    max-width: 40px;
    max-height: 40px;
    object-fit: contain;
    filter: drop-shadow(0 0 4px rgba(64, 224, 208, 0.7));
  }

  .entry-thumb-placeholder {
    width: 40px;
    height: 40px;
  }

  .entry-date {
    font-family: 'Times New Roman', Times, serif;
    font-size: 15px;
    color: var(--muted);
    padding-top: 2px;
    white-space: nowrap;
  }

  .entry-item {
    font-family: 'Times New Roman', Times, serif;
    font-size: 16px;
    font-weight: 400;
    line-height: 1.45;
    word-break: break-word;
  }

  .entry-desc {
    font-family: 'Times New Roman', Times, serif;
    font-size: 15px;
    line-height: 1.65;
    color: var(--muted);
    font-style: italic;
  }

  .entry-type {
    font-family: 'Times New Roman', Times, serif;
    font-size: 15px;
    color: var(--muted);
    text-align: right;
    padding-top: 2px;
    cursor: pointer;
  }

  .entry-tags {
    grid-column: 2 / 5;
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 8px;
  }


  .filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }

  .filter-chip {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--ink);
    border: 1px solid var(--ink);
    padding: 2px 6px 2px 9px;
    border-radius: 2px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    cursor: default;
    white-space: nowrap;
  }

  .filter-chip .chip-remove {
    cursor: pointer;
    font-size: 12px;
    color: var(--muted);
    transition: color 0.15s;
    line-height: 1;
  }

  .filter-chip .chip-remove:hover { color: var(--ink); }

  .tag-clickable { cursor: pointer; }
  .tag-clickable:hover { color: var(--ink); border-color: var(--ink); }

  .tag {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--rule);
    padding: 2px 7px;
    border-radius: 2px;
  }

  /* ── HOVER PREVIEW ── */
  .hover-preview {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 320px;
    height: 320px;
    pointer-events: none;
    z-index: 50;
    opacity: 0;
    transition: opacity 0.2s ease;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
  }



  .hover-preview.visible { opacity: 1; }

  .hover-preview img {
    max-width: 75%;
    max-height: 75%;
    object-fit: contain;
    filter: drop-shadow(0 0 12px rgba(64, 224, 208, 0.9)) drop-shadow(0 0 24px rgba(64, 224, 208, 0.5));
  }

  .hover-preview-placeholder {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    text-align: center;
    padding: 20px;
  }

  /* ── DETAIL VIEW ── */
  #detail-view {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--paper);
    z-index: 100;
    overflow-y: auto;
    animation: fadeIn 0.2s ease;
    color: #ff0000;
  }

  #detail-view * {
    color: #ff0000 !important;
  }

  #detail-view.visible { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .detail-inner {
    max-width: 700px;
    margin: 0 auto;
    padding: 60px 32px 120px;
  }

  .back-btn {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    margin-bottom: 48px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: color 0.15s;
  }

  .back-btn:hover { color: var(--red); font-weight: 700; text-decoration: none; }

  .detail-type-label {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .detail-title {
    font-family: 'Times New Roman', Times, serif;
    font-size: clamp(22px, 4vw, 36px);
    font-weight: 400;
    color: var(--red);
    line-height: 1.25;
    margin-bottom: 8px;
  }

  }

  .detail-date {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 36px;
  }

  .detail-image {
    width: 100%;
    max-width: 420px;
    aspect-ratio: 1;
    background: transparent;
    margin-bottom: 40px;
    display: flex;
    align-items: center;
    justify-content: center;

    max-height: 100%;

    font-family: 'Inter', sans-serif;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .detail-section {
    margin-bottom: 28px;
  }

  .detail-section-label {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #ff0000;
    margin-bottom: 8px;

    font-size: 17px;
    font-style: italic;
    line-height: 1.6;
    color: var(--ink);
  }

  .detail-long-desc {
    font-size: 15px;
    line-height: 1.8;
    color: var(--muted);
  }

  .detail-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .detail-related {
    font-size: 15px;
    line-height: 1.8;
    color: var(--muted);
  }

  .detail-related span {
    display: block;
  }

  .related-link {
    color: var(--muted);
    text-decoration: none;
    cursor: pointer;

  .related-link:hover { color: var(--muted); font-weight: 700; }

  .external-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-style: italic;
    color: var(--red);
    text-decoration: none;
  }

  .external-link:hover { font-weight: 700; }

  /* ── MOBILE ── */
  @media (max-width: 600px) {
    #index-view { padding: 24px 16px 100px; }

    .archive-title { font-size: 26px; margin-bottom: 24px; white-space: nowrap; }
    .archive-title br { display: block; white-space: normal; }

    .table-header { display: none; }

    .filter-bar { flex-wrap: wrap; gap: 4px; }

    .entry {
      grid-template-columns: 44px 1fr;
      grid-template-rows: auto auto auto;
      gap: 4px 12px;
      padding: 14px 8px;
    }

    .entry-thumb {
      grid-column: 1;
      grid-row: 1 / 3;
      width: 44px;
      height: 44px;
      align-self: start;
    }

    .entry-thumb img {
      max-width: 44px;
      max-height: 44px;
    }

    .entry-item {
      grid-column: 2;
      grid-row: 1;
      font-size: 16px;
      line-height: 1.3;
    }

    .entry-desc {
      grid-column: 2;
      grid-row: 2;
      font-size: 14px;
      line-height: 1.5;
      margin-top: 4px;
    }

    .entry-date {
      grid-column: 2;
      grid-row: 3;
      font-size: 13px;
      margin-top: 6px;
    }

    .entry-type {
      grid-column: 2;
      grid-row: 3;
      text-align: right;
      font-size: 13px;
      margin-top: 6px;
    }

    /* Mobile: no floating preview */
    .hover-preview { display: none; }

    .detail-inner { padding: 32px 16px 80px; }

    .detail-title { font-size: 22px; }

    .detail-image { max-width: 100%; }

    .back-btn { margin-bottom: 28px; }
  }
</style>
</head>

// ── SHEET URL ──
// ── SORT STATE ──
let sortDesc = true;

const TYPES = ['Tether', 'Map', 'Sacred Object', 'Memory'];

function getSorted() {
  return [...entries]
    .map((e, i) => ({ ...e, originalIndex: i }))
    .filter(e => {
      if (activeFilters.size === 0) return true;
      const typeFilters = [...activeFilters].filter(f => TYPES.includes(f));
      const tagFilters  = [...activeFilters].filter(f => !TYPES.includes(f));
      const typeMatch = typeFilters.length === 0 || typeFilters.includes(e.type);
      const tagMatch  = tagFilters.length === 0 || tagFilters.every(f => e.tags.includes(f));
      return typeMatch && tagMatch;
    })
    .sort((a, b) => sortDesc
      ? b.date.localeCompare(a.date)
      : a.date.localeCompare(b.date)
    );
}

function toggleSort() {
  sortDesc = !sortDesc;
  document.getElementById('sort-arrow').textContent = sortDesc ? '▾' : '▴';
  renderList();
}

  const sorted = getSorted();
  list.innerHTML = sorted.map((e) => `
    <div class="entry" onclick="openDetail(${e.originalIndex})">
      <div class="entry-thumb">${e.previewImage ? `<img src="${e.previewImage}" alt="${e.title}" onerror="this.style.display='none'" />` : '<div class="entry-thumb-placeholder"></div>'}</div>
      <div class="entry-date" onmouseenter="showPreview(${e.originalIndex})" onmouseleave="hidePreview()">${e.date}</div>
      <div class="entry-item" onmouseenter="showPreview(${e.originalIndex})" onmouseleave="hidePreview()">${e.title}</div>
      <div class="entry-desc" onmouseenter="showPreview(${e.originalIndex})" onmouseleave="hidePreview()">${e.shortDesc}</div>
      <div class="entry-type" onmouseenter="showPreview(${e.originalIndex})" onmouseleave="hidePreview()" onclick="event.stopPropagation(); addFilter('${e.type}')" style="cursor:pointer;">${e.type}</div>

    </div>
  `).join('');
}

// ── HOVER PREVIEW ──
function showPreview(i) {
  const e = entries[i];
  const preview = document.getElementById('hover-preview');
  const img = document.getElementById('hover-preview-img');
  const ph = document.getElementById('hover-preview-ph');
  if (!preview) return;

  if (e.hoverAsset) {
    img.src = e.hoverAsset;
    img.style.display = '';
    ph.style.display = 'none';
  } else {
    img.style.display = 'none';
    ph.style.display = '';
    ph.textContent = '[ ' + e.type.toLowerCase() + ' ]';
  }

  preview.classList.add('visible');
}

function hidePreview() {
  document.getElementById('hover-preview').classList.remove('visible');
}

// ── DETAIL VIEW ──
function openDetail(i) {
  const e = entries[i];

  document.getElementById('d-type-label').textContent = e.type;
  const titleEl = document.getElementById('d-title');
  titleEl.textContent = e.title;
  titleEl.className = 'detail-title';
  document.getElementById('d-date').textContent = e.date;

  // Image
  const imgBox = document.getElementById('d-image');
  if (e.pageImage) {
    imgBox.innerHTML = `<img src="${e.pageImage}" alt="${e.title}" onerror="this.parentNode.innerHTML='<span class=detail-image-placeholder>[ image ]</span>'" />`;
  } else {
    imgBox.innerHTML = `<span class="detail-image-placeholder">[ ${e.type.toLowerCase()} ]</span>`;
  }

  // Short desc
  const shortSection = document.getElementById('d-short-section');
  const shortEl = document.getElementById('d-short');
  if (e.shortDesc) { shortEl.textContent = e.shortDesc; shortSection.style.display = ''; }
  else { shortSection.style.display = 'none'; }

  // Long desc
  const longSection = document.getElementById('d-long-section');
  const longEl = document.getElementById('d-long');
  if (e.longDesc) { longEl.textContent = e.longDesc; longSection.style.display = ''; }
  else { longSection.style.display = 'none'; }

  // Tags
  const tagsSection = document.getElementById('d-tags-section');
  const tagsEl = document.getElementById('d-tags');
  if (e.tags.length) {
    const allTerms = [...new Set([e.type, ...e.tags])];
    tagsEl.innerHTML = allTerms.map(t => `<span class="tag tag-clickable" onclick="closeDetail(); addFilter('${t}')">${t}</span>`).join('');
    tagsSection.style.display = '';
  } else { tagsSection.style.display = 'none'; }

  // Related — computed from shared tags
  const relSection = document.getElementById('d-related-section');
  const relEl = document.getElementById('d-related');
  const related = entries
    .map((x, idx) => ({ ...x, idx }))
    .filter(x => x.idx !== entries.indexOf(e) && x.tags.some(t => e.tags.includes(t)));
  if (related.length) {
    relEl.innerHTML = related.map(r =>
      `<span><a class="related-link" onclick="openDetail(${r.idx})">${r.title}</a></span>`
    ).join('');
    relSection.style.display = '';
  } else { relSection.style.display = 'none'; }

  // External link
  const linkSection = document.getElementById('d-link-section');
  const linkEl = document.getElementById('d-link');
  linkEl.href = e.externalLink || '#';
  linkSection.style.display = '';

  hidePreview();
  document.getElementById('detail-view').classList.add('visible');
  document.getElementById('detail-view').scrollTop = 0;
}

function closeDetail() {
  document.getElementById('detail-view').classList.remove('visible');
}

// ── FILTERS ──
let activeFilters = new Set();

function addFilter(tag) {
  activeFilters.add(tag);
  renderFilters();
  renderList();
}

function removeFilter(tag) {
  activeFilters.delete(tag);
  renderFilters();
  renderList();
}

function renderFilters() {
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = [...activeFilters].map(tag => `
    <span class="filter-chip">${tag} <span class="chip-remove" onclick="removeFilter('${tag}')">×</span></span>
  `).join('');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetail();
});

async function loadEntries() {
  try {
    const res = await fetch('data.json');
    const data = await res.json();
    populate(data);
  } catch (err) {
    // fallback to embedded data for local preview
    populate(EMBEDDED_DATA);
  }
}

function populate(data) {
  entries.length = 0;
  data.filter(row => !row.draft).forEach(row => {
    entries.push({
      id: row.id || '',
      title: row.title || '',
      date: row.date || '',
      type: row.type || '',
      shortDesc: row.shortDesc || '',
      longDesc: row.longDesc || '',
      tags: Array.isArray(row.tags) ? row.tags : [],
      previewImage: row.previewImage || '',
      hoverAsset: row.hoverAsset || '',
      pageImage: row.pageImage || '',
      externalLink: row.externalLink || '',
      relatedObjects: []
    });
  });
  renderList();
}

loadEntries();
